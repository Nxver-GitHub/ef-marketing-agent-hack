[pytest]
# Org-chart test suite configuration.
#
# All tests carry one of these markers; CI selects subsets via -m.
markers =
    unit: pure-logic invariants — no DB, no network.
    integration: live-DB pipeline tests; require DATABASE_URL + RW access.
    data_quality: read-only assertions on the current materialized graph.
    performance: timing budgets; fail if a stage exceeds the documented bound.
    snapshot: diff a known-good company chart against current state.

# Default: only `unit` tests run. CI / human invocations explicitly pick the
# heavier markers via `pytest -m integration` etc.
addopts = -m unit --strict-markers --tb=short

# Discover tests across all subfolders, but treat each folder's __init__.py as
# importable so shared fixtures from conftest.py propagate.
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async pytest support — every integration test uses asyncio for asyncpg.
#
# Loop scope is session, not function. The credence backend caches a
# module-level asyncpg pool in `credence.db._pool`. With function-scoped
# loops, each test gets a fresh loop while the cached pool stays bound to
# the loop of whichever test created it — the next test then hits
# "Event loop is closed" / "Future attached to a different loop" during
# teardown. A session-scoped loop keeps the pool and the loop in sync;
# the session-end fixture in conftest.py closes the pool exactly once.
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
